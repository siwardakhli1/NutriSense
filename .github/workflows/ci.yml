# ==========================================
# CI - Intégration continue NutriSense
# ==========================================
# Se déclenche à chaque push et pull request sur main/develop
# Vérifie :
#   1. Le backend compile (TypeScript)
#   2. Les tests unitaires Jest passent
#   3. Le lint est OK
#   4. Le frontend Expo compile

name: CI - NutriSense

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Empêche plusieurs runs simultanés sur la même branche
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================
  # JOB 1 : Backend (tests + build)
  # ==========================================
  backend:
    name: 🔧 Backend (test + build)
    runs-on: ubuntu-latest

    # Postgres en service pour les tests d'intégration
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nutrisense
          POSTGRES_PASSWORD: nutrisense
          POSTGRES_DB: nutrisense_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: 🗃️ Generate Prisma Client
        working-directory: ./backend
        run: npx prisma generate

      - name: 🗄️ Apply database migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://nutrisense:nutrisense@localhost:5432/nutrisense_test
        run: npx prisma migrate deploy

      - name: 🎨 Lint (ESLint)
        working-directory: ./backend
        run: npm run lint
        continue-on-error: true  # non-bloquant si des warnings

      - name: 🏗️ Build TypeScript
        working-directory: ./backend
        run: npm run build

      - name: 🧪 Run tests + coverage
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://nutrisense:nutrisense@localhost:5432/nutrisense_test
          JWT_SECRET: test-secret-ci
          NODE_ENV: test
        run: npm test

      - name: 📊 Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  # ==========================================
  # JOB 2 : Frontend (type-check + lint + tests)
  # ==========================================
  frontend:
    name: 📱 Frontend (type-check + tests)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 TypeScript type-check
        run: npx tsc --noEmit
        continue-on-error: true  # non-bloquant si erreurs mineures

      - name: 🎨 Lint (Expo)
        run: npm run lint
        continue-on-error: true

      - name: 🧪 Run tests + coverage
        run: npm run test:coverage

      - name: 📊 Upload frontend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: coverage/
          retention-days: 7

  # ==========================================
  # JOB 3 : Docker (validation image)
  # ==========================================
  docker:
    name: 🐳 Docker build
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: nutrisense-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # JOB 4 : Security scan
  # ==========================================
  security:
    name: 🔒 Security audit
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔍 npm audit (backend)
        working-directory: ./backend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: 🔍 npm audit (frontend)
        run: npm audit --audit-level=high
        continue-on-error: true
